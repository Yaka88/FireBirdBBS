name: Cross-Compile for MIPSLE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install MIPSLE cross-compilation toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mipsel-linux-gnu g++-mipsel-linux-gnu binutils-mipsel-linux-gnu libc6-dev-mipsel-cross
        
    - name: Create stub libraries for missing dependencies
      run: |
        mkdir -p /tmp/stubs
        
        # Create termcap stub library
        cat > /tmp/stubs/termcap.c << 'EOF'
        /* Minimal termcap stub for cross-compilation */
        #include <stdio.h>
        #include <string.h>
        #include <stdlib.h>

        static char termcap_data[2048];
        static int initialized = 0;

        int tgetent(char *bp, const char *name) {
            if (!initialized) {
                initialized = 1;
            }
            return 1;
        }

        int tgetnum(const char *id) {
            if (strcmp(id, "co") == 0) return 80;
            if (strcmp(id, "li") == 0) return 24;
            return -1;
        }

        int tgetflag(const char *id) {
            return 0;
        }

        char *tgetstr(const char *id, char **area) {
            static char buf[64];
            
            if (strcmp(id, "pc") == 0) { *buf = 0; return buf; }
            if (strcmp(id, "cl") == 0) { strcpy(buf, "\033[H\033[J"); return buf; }
            if (strcmp(id, "ce") == 0) { strcpy(buf, "\033[K"); return buf; }
            if (strcmp(id, "sr") == 0) { strcpy(buf, "\033M"); return buf; }
            if (strcmp(id, "cm") == 0) { strcpy(buf, "\033[%i%d;%dH"); return buf; }
            if (strcmp(id, "so") == 0) { strcpy(buf, "\033[7m"); return buf; }
            if (strcmp(id, "se") == 0) { strcpy(buf, "\033[m"); return buf; }
            
            return NULL;
        }

        char *tgoto(const char *cap, int col, int row) {
            static char buf[64];
            snprintf(buf, sizeof(buf), "\033[%d;%dH", row + 1, col + 1);
            return buf;
        }

        int tputs(const char *str, int affcnt, int (*putc_func)(int)) {
            if (str) {
                while (*str) {
                    putc_func(*str++);
                }
            }
            return 0;
        }

        char PC = 0;
        char *BC = NULL;
        char *UP = NULL;
        short ospeed = 0;
        EOF

        # Create crypt stub library
        cat > /tmp/stubs/crypt.c << 'EOF'
        /* Minimal crypt stub for cross-compilation */
        #include <string.h>
        #include <stdlib.h>

        char *crypt(const char *key, const char *salt) {
            static char result[14];
            int i;
            
            result[0] = salt[0];
            result[1] = salt[1];
            
            for (i = 0; i < 11 && key[i]; i++) {
                result[i + 2] = 'A' + ((key[i] + salt[i % 2]) % 26);
            }
            
            for (; i < 11; i++) {
                result[i + 2] = 'A' + ((salt[0] + salt[1] + i) % 26);
            }
            
            result[13] = '\0';
            return result;
        }
        EOF

        # Create bsd/rpcsvc stub libraries
        cat > /tmp/stubs/bsd.c << 'EOF'
        /* Minimal BSD compatibility stubs */
        EOF

        cat > /tmp/stubs/rpcsvc.c << 'EOF'
        /* Minimal RPC service stubs */
        EOF

        # Create five_stub for removed game module
        cat > /tmp/stubs/five_stub.c << 'EOF'
        /* Stub for five.c functions that were removed */
        int five_pk(int fd, int first) {
            return 0;
        }
        EOF

        # Build stub libraries
        cd /tmp/stubs
        mipsel-linux-gnu-gcc -c -fno-stack-protector -O2 termcap.c
        mipsel-linux-gnu-gcc -c -fno-stack-protector -O2 crypt.c
        mipsel-linux-gnu-gcc -c -fno-stack-protector -O2 bsd.c
        mipsel-linux-gnu-gcc -c -fno-stack-protector -O2 rpcsvc.c
        mipsel-linux-gnu-gcc -c -fno-stack-protector -O2 five_stub.c
        mipsel-linux-gnu-ar rcs libtermcap.a termcap.o
        mipsel-linux-gnu-ar rcs libcrypt.a crypt.o
        mipsel-linux-gnu-ar rcs libbsd.a bsd.o
        mipsel-linux-gnu-ar rcs librpcsvc.a rpcsvc.o

    - name: Configure build for MIPSLE
      run: |
        cd bbssrc
        
        # Run configure with appropriate settings
        echo "/home/bbs" | \
        echo "" | \
        echo "" | \
        echo "" | \
        echo "FireBirdBBS" | \
        echo "FireBird BBS" | \
        echo "bbs.firebird.local" | \
        echo "" | \
        echo "" | \
        echo "" | \
        echo "" | \
        CC=mipsel-linux-gnu-gcc CFLAGS="-fno-stack-protector -O2" LDFLAGS="-L/tmp/stubs -L/usr/mipsel-linux-gnu/lib" ./configure --host=mipsel-linux-gnu || true

        # Update Makefile to use cross-compiler
        sed -i 's/^CC.*=.*gcc$/CC       = mipsel-linux-gnu-gcc/' Makefile
        sed -i 's|^LIBS.*=.*|LIBS     = -L/tmp/stubs -ltermcap -ldl -lrpcsvc -lbsd|' Makefile
        
    - name: Build main BBS daemon
      run: |
        cd bbssrc/src
        
        # Update Makefile to exclude five.c and add stub
        sed -i '/five\.c/d' Makefile
        sed -i '/five\.o/d' Makefile
        sed -i 's|\$(COBJS) \$(LIBS)|\$(COBJS) /tmp/stubs/five_stub.o \$(LIBS) -L../lib -lBBS -lcrypt|' Makefile
        
        # Build with cross-compiler
        make clean
        CFLAGS="-fno-stack-protector -O2" make || true

    - name: Build utilities
      run: |
        cd bbssrc/util/local_utl
        
        # Update Makefile for cross-compilation
        sed -i 's/^CC.*=.*gcc$/CC       = mipsel-linux-gnu-gcc/' Makefile
        sed -i 's/^CFLAGS.*$/CFLAGS   = -fno-stack-protector -O2 -I..\/..\/include/' Makefile
        sed -i '/^BBSHOME/a LDFLAGS  = -L\/tmp\/stubs -lcrypt' Makefile
        sed -i 's/bbspop3d.c$/bbspop3d.c \$(LDFLAGS)/' Makefile
        
        make clean
        CFLAGS="-fno-stack-protector -O2" make || true
        
        # Build deljunk
        cd ../deljunk
        CC=mipsel-linux-gnu-gcc CFLAGS="-fno-stack-protector -O2" make || true

    - name: Collect binaries
      run: |
        mkdir -p Bin
        
        # Copy main daemon
        [ -f bbssrc/src/bbsd ] && cp bbssrc/src/bbsd Bin/
        
        # Copy utilities
        cd bbssrc/util/local_utl
        for binary in account averun bbspop3d bbstop bfinger birthday horoscope newacct poststat remake showuser usage; do
          [ -f "$binary" ] && cp "$binary" ../../../Bin/
        done
        cd ../../..
        
        # Copy deljunk
        [ -f bbssrc/util/deljunk/deljunk ] && cp bbssrc/util/deljunk/deljunk Bin/
        
        # List all compiled binaries
        ls -lh Bin/
        file Bin/* | grep MIPS || true
        
    - name: Create release archive
      run: |
        tar czf FireBirdBBS-mipsle-binaries.tar.gz Bin/
        ls -lh FireBirdBBS-mipsle-binaries.tar.gz
        
    - name: Upload binaries as artifact
      uses: actions/upload-artifact@v4
      with:
        name: firebirdbb-mipsle-binaries
        path: |
          Bin/
          FireBirdBBS-mipsle-binaries.tar.gz
        retention-days: 90
